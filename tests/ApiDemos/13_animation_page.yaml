测试用例 13：Animation 分类基础页面可打开

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Animation 分类可以打开，并展示动画相关示例。

前置条件：
1. ApiDemos 已正常启动。
2. 当前位于首页。

测试步骤意图：
点击首页中的 Animation 分类；等待动画示例列表出现；选择一个基础动画示例打开；观察页面是否成功进入动画示例。

期望结果：
Animation 分类和至少一个动画示例可以正常打开；页面没有崩溃。

补充说明：
动画效果本身不做像素级断言，只验证页面进入和关键内容可见。
