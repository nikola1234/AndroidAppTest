测试用例 16：Media 分类基础页面可打开

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Media 分类可以打开，并展示媒体相关示例入口。

前置条件：
1. ApiDemos 已正常启动。
2. 当前位于首页。

测试步骤意图：
点击首页中的 Media 分类；等待媒体示例列表出现；选择一个基础媒体示例打开；观察页面是否成功进入。

期望结果：
Media 分类打开成功；至少一个媒体示例页面可以进入；页面没有崩溃。

补充说明：
该用例只验证页面可达性，不强制播放音视频，因为不同设备和系统版本的媒体权限与解码能力可能不同。
