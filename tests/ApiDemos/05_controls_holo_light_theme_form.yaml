测试用例 05：Views - Controls - Holo Light Theme 表单基础操作

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Holo Light Theme 控件页面可以正常打开并完成基础控件交互。

前置条件：
1. ApiDemos 已正常启动。
2. 当前可以进入 Views -> Controls。

测试步骤意图：
进入 Views，打开 Controls，再打开 3. Holo Light Theme；在页面中输入一段文本，点击复选框，点击单选按钮，并验证页面仍然稳定展示。

期望结果：
Holo Light Theme 页面打开成功；输入和点击操作生效；页面没有崩溃或跳转到异常页面。

补充说明：
该用例用于扩展 Controls 页面主题覆盖。
