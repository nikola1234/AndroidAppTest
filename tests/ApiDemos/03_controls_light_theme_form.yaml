测试用例 03：Views - Controls - Light Theme 表单基础操作

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Light Theme 控件页面中的输入框、复选框、单选按钮和开关类控件可以正常交互。

前置条件：
1. ApiDemos 已正常启动。
2. 当前可以从首页进入 Views。

测试步骤意图：
进入 Views，打开 Controls，再打开 1. Light Theme；在文本输入框中输入 ApiDemos test；勾选一个复选框；选择一个单选按钮；切换一个开关或 ToggleButton。

期望结果：
文本输入框显示 ApiDemos test；复选框处于选中状态；单选按钮处于选中状态；开关或 ToggleButton 状态发生变化。

补充说明：
该用例是 ApiDemos 的核心表单交互用例。Agent 应优先使用当前页面 dump 中的控件文本、class、clickable 状态和 bounds 做定位和二次筛选。
