测试用例 17：OS 分类基础页面可打开

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 OS 分类可以打开，并展示操作系统相关示例入口。

前置条件：
1. ApiDemos 已正常启动。
2. 当前位于首页。

测试步骤意图：
点击首页中的 OS 分类；等待 OS 示例列表出现；选择一个不需要特殊权限的基础示例打开；观察页面是否成功展示。

期望结果：
OS 分类和基础示例页面可以正常打开；没有出现权限错误或应用崩溃。

补充说明：
如果某些 OS 示例需要系统权限，Agent 应选择当前页面中更安全、可见且可点击的基础示例。
