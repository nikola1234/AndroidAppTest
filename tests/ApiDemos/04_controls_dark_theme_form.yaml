测试用例 04：Views - Controls - Dark Theme 表单基础操作

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Dark Theme 控件页面在深色主题下仍然可以进行基础表单操作。

前置条件：
1. ApiDemos 已正常启动。
2. 当前可以进入 Views -> Controls。

测试步骤意图：
进入 Views，打开 Controls，再打开 2. Dark Theme；向文本输入框输入 dark theme test；勾选复选框；选择一个单选按钮；切换 ToggleButton。

期望结果：
Dark Theme 页面成功打开；输入内容、复选框、单选按钮和 ToggleButton 均能正常响应。

补充说明：
该用例用于确认同一套控件在不同主题页面下仍可被识别和操作。
