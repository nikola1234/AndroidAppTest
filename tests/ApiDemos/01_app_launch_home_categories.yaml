测试用例 01：App 启动并展示首页分类

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 ApiDemos 可以正常启动，并在首页展示主要功能分类。

前置条件：
1. ApiDemos 已安装在测试设备上。
2. Appium Server 已启动。
3. 设备已解锁，且没有系统弹窗遮挡应用。

测试步骤意图：
打开 ApiDemos，先验证首屏分类；然后向下滚动首页列表，继续验证 Graphics、Media、OS、Preference、Text、Views 等分类。

期望结果：
通过滚动列表，可以依次看到 Accessibility、Animation、App、Content、Graphics、Media、OS、Preference、Text、Views。

补充说明：
该用例用于验证最基础的启动能力和首页列表可滚动性。Agent 应先检查首屏可见分类，再通过滚动列表继续检查屏幕外分类，不需要人工编写 locator。
