测试用例 11：App - Alert Dialogs 取消弹窗

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Alert Dialogs 中带取消按钮的弹窗可以通过 Cancel 或取消按钮关闭。

前置条件：
1. ApiDemos 已正常启动。
2. 当前可以进入 App -> Alert Dialogs。

测试步骤意图：
进入 App -> Alert Dialogs；点击一个会展示带取消按钮弹窗的入口；等待弹窗出现；点击 Cancel、取消或类似按钮。

期望结果：
弹窗出现后可以被取消按钮关闭；关闭后页面仍停留在 Alert Dialogs 示例页面。

补充说明：
如果弹窗按钮文本因系统语言不同而变化，Agent 应根据按钮 class、clickable 状态和可见文本综合判断。
