测试用例 15：Text 分类文本展示页面可打开

App 信息：
- App 名称：ApiDemos
- appPackage：io.appium.android.apis
- appActivity：io.appium.android.apis.ApiDemos

测试目标：
验证 Text 分类可以打开，并展示文本相关示例。

前置条件：
1. ApiDemos 已正常启动。
2. 当前位于首页。

测试步骤意图：
点击首页中的 Text 分类；选择一个文本展示或链接相关示例；等待页面加载；观察页面上是否存在文本内容。

期望结果：
Text 示例页面可以打开，并显示可见文本内容。

补充说明：
该用例用于覆盖文本展示类页面和文本可见性断言。
