测试用例示例：登录成功

测试目标：
验证用户使用正确的账号和密码登录后，可以成功进入 App 首页。

前置条件：
1. 被测 App 已安装并可以正常启动。
2. 测试环境网络正常。
3. 存在一个可用的测试账号，账号为 test_user，密码为 123456。
4. 当前用户未登录，或者启动 App 后可以回到登录页面。

测试步骤意图：
打开 App，进入登录页面，输入正确的账号和密码，点击登录按钮。

期望结果：
登录成功后进入首页，并且页面上可以看到“首页”相关内容。

补充说明：
具体控件定位方式、点击顺序、等待逻辑和断言细节由测试 Agent 根据页面结构、历史元素记忆或 UI dump 自动生成，不需要人工在这里编写 action、locator 或 Appium 代码。
